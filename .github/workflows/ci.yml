name: AAOS CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build and start services
      run: |
        docker compose build
        docker compose up -d
        sleep 20

    - name: Run Tests
      run: |
        docker compose exec -T python-worker pip install pytest httpx
        docker compose exec -T python-worker python -m pytest test_auth.py

    - name: Tear down
      if: always()
      run: docker compose down

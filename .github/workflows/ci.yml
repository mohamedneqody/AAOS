name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black pytest
        pip install -r workflows/20-python-workers/requirements.txt
    - name: Check formatting with Black
      run: black --check workflows/20-python-workers/ shared_libs/
    - name: Lint with Ruff
      run: ruff check workflows/20-python-workers/ shared_libs/
    - name: Check Docker Build
      run: docker-compose build python-worker
